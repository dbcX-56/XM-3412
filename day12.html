<!DOCTYPE html>

      font-size: 16px;
      letter-spacing: 0.3px;
      white-space: pre-line;

      backdrop-filter: blur(6px);
      animation: fadeIn 1.2s ease;
      text-align: left;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {

        transform: translateY(0);

</head>
