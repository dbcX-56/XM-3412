<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For you</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">

<style>
body {
  background: #EAF4FB;
  font-family: 'Quicksand', sans-serif;
  text-align: center;
  color: #6B4F3A;
}

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  margin-top: 20px;
}

.header h2 { margin: 0; }

.cute-img {
  width: 140px;
  margin: 12px auto;
  display: block;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  max-width: 360px;
  margin: 30px auto;
}

.card {
  perspective: 1000px;
}

.inner {
  height: 110px;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.card.open .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 18px;

  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;

  backface-visibility: hidden;
  font-weight: bold;
  font-size: 15px;
}

.front { background: #D6BFA9; }

.back {
  background: #A7C7E7;
  transform: rotateY(180deg);
}

/* 🔥 mờ nhẹ */
.locked {
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="header">
  <h2>3412</h2>
  <span>🧸🥄</span>
</div>

<img src="cuaxin.png?v=111" class="cute-img">

<p>Mỗi ngày mở một cái nha... 💌</p>

<div class="calendar" id="cal"></div>

<script>
const today = new Date();

// 🔥 CHỈ SỬA Ở ĐÂY
const unlockDates = {
  1: "2026-03-01",
  2: "2026-03-05",
  3: "2026-03-10",
  4: "2026-03-20",
  5: "2026-03-30",
  // 👉 thêm sau:
  // 5: "2026-06-01"
};

function render(total) {
  const container = document.getElementById("cal");

  for (let i = 1; i <= total; i++) {

    const unlockStr = unlockDates[i];
    const unlock = unlockStr ? new Date(unlockStr + "T00:00:00+07:00") : null;

    const card = document.createElement("div");
    card.classList.add("card");

    const inner = document.createElement("div");
    inner.classList.add("inner");

    const front = document.createElement("div");
    front.classList.add("front");

    const back = document.createElement("div");
    back.classList.add("back");

    // 🔥 LOGIC
    if (!unlock) {
      front.innerHTML = `🔒 Day ${i}`;
      card.classList.add("locked");
    } else if (today >= unlock) {
      front.innerHTML = `🔓 Day ${i}`;
    } else {
      front.innerHTML = `🔒 Day ${i}`;
      card.classList.add("locked");
    }

    back.innerHTML = `💌<br>Mở`;

    card.onclick = () => {
      if (!unlock || today < unlock) {
        alert("⏳ Chưa tới ngày...");
        return;
      }

      card.classList.add("open");

      setTimeout(() => {
        window.location.href = `day${i}.html`;
      }, 600);
    };

    inner.appendChild(front);
    inner.appendChild(back);
    card.appendChild(inner);
    container.appendChild(card);
  }
}

render(12);
</script>

</body>
</html>
