<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For you</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">

<style>
body {
  background: #EAF4FB;
  font-family: 'Quicksand', sans-serif;
  text-align: center;
  color: #6B4F3A;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 15px;
  max-width: 500px;
  margin: auto;
}

.card {
  width: 100%;
  height: 100px;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.card.open .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;

  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;

  backface-visibility: hidden;
  font-weight: bold;
}

/* MẶT TRƯỚC */
.front {
  background: #D6BFA9;
}

/* MẶT SAU */
.back {
  background: #A7C7E7;
  transform: rotateY(180deg);
}

.card.open .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  backface-visibility: hidden;
}

.front {
  background: #D6BFA9;
}

.back {
  background: #A7C7E7;
  transform: rotateY(180deg);
}

.locked {
  opacity: 0.5;
}

.opened {
  border: 2px solid #6B4F3A;
}
</style>
</head>

<body>

<h2>3412</h2>
<p>Mỗi ngày mở một cái nha...</p>

<div class="calendar" id="calendar"></div>

<script>
const startDate = new Date("2026-05-04");
const totalDays = 30;

const today = new Date();
const calendar = document.getElementById("calendar");

for (let i = 1; i <= totalDays; i++) {

  const unlock = new Date(startDate);
  unlock.setDate(startDate.getDate() + (i - 1));

  const isOpened = localStorage.getItem("day" + i);

  const card = document.createElement("div");
  card.classList.add("card");

  if (isOpened) {
    card.classList.add("open");
    card.classList.add("opened");
  }

  const inner = document.createElement("div");
  inner.classList.add("inner");

  const front = document.createElement("div");
  front.classList.add("front");

  const back = document.createElement("div");
  back.classList.add("back");

  if (today < unlock) {
    front.innerHTML = `🔒 Day ${i}`;
    card.classList.add("locked");
  } else {
    front.innerHTML = isOpened ? `✔️ Day ${i}` : `🔓 Day ${i}`;
  }

  back.innerHTML = `💌<br>Mở thư`;

  card.onclick = () => {
    if (today < unlock) {
      alert("⏳ Chưa tới ngày...");
      return;
    }

    card.classList.add("open");
    card.classList.add("opened");

    localStorage.setItem("day" + i, "true");

    setTimeout(() => {
      window.location.href = `day${i}.html`;
    }, 600);
  };

  inner.appendChild(front);
  inner.appendChild(back);
  card.appendChild(inner);
  calendar.appendChild(card);
}
</script>

</body>
</html>
