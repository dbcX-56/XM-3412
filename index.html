<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For you</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">

<style>
body {
  background: #EAF4FB;
  font-family: 'Quicksand', sans-serif;
  text-align: center;
  color: #6B4F3A;
}

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  margin-top: 20px;
}

.cute-img {
  width: 140px;
  margin: 12px auto;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  max-width: 360px;
  margin: 30px auto;
}

.card {
  perspective: 1000px;
}

.inner {
  height: 110px;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.card.open .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  backface-visibility: hidden;
  font-weight: bold;
}

/* 🤎 DEFAULT */
.front { background: #D6BFA9; }

.back {
  background: #A7C7E7;
  transform: rotateY(180deg);
}

/* 🔒 LOCK */
.card.locked .front {
  opacity: 0.5;
  filter: grayscale(30%);
}

/* 🎂 INTRO */
.intro-card {
  grid-column: span 3;
}

.intro-card .inner {
  height: 115px;
}

.intro-card .front {
  background: linear-gradient(135deg, #DFF6FF, #F0FBFF);
  box-shadow: 0 0 12px rgba(173,216,230,0.5);
  transition: 0.3s;
}

.intro-card:hover .front {
  transform: scale(1.04);
  box-shadow: 0 0 20px rgba(173,216,230,1);
}
</style>
</head>

<body>

<div class="header">
  <h2>3412</h2>
  <span>🧸🥄</span>
</div>

<img src="cuaxin.png" class="cute-img">

<p>Mỗi ngày mở một cái nha... 💌</p>

<div class="calendar" id="cal"></div>

<script>
const today = new Date();

const unlockDates = {
  1: "2026-03-01",
  2: "2026-03-05",
  3: "2026-03-10",
  4: "2026-03-20",
  5: "2026-03-30",
  6: "2026-04-05"
};

function render(total = 12) {
  const container = document.getElementById("cal");

  // 🎂 INTRO
  const intro = document.createElement("div");
  intro.classList.add("card", "intro-card");

  intro.innerHTML = `
    <div class="inner">
      <div class="front">🎂<br>Ngày của Xịn nè</div>
      <div class="back">Mở nè 🎂</div>
    </div>
  `;

  intro.onclick = () => {
    intro.classList.add("open");
    setTimeout(() => {
      window.location.href = "start.html";
    }, 600);
  };

  container.appendChild(intro);

  // DAY
  for (let i = 1; i <= total; i++) {

    const unlockStr = unlockDates[i];
    const unlock = unlockStr ? new Date(unlockStr + "T00:00:00+07:00") : null;

    const card = document.createElement("div");
    card.classList.add("card");

    if (!unlock || today < unlock) {
      card.classList.add("locked");
    }

    card.innerHTML = `
      <div class="inner">
        <div class="front">
          ${unlock && today >= unlock ? "🔓" : "🔒"} Day ${i}
        </div>
        <div class="back">💌<br>Mở</div>
      </div>
    `;

    card.onclick = () => {
      if (!unlock || today < unlock) {
        alert("⏳ Chưa tới ngày...");
        return;
      }

      card.classList.add("open");

      setTimeout(() => {
        window.location.href = `day${i}.html`;
      }, 600);
    };

    container.appendChild(card);
  }
}

render(); // 👈 luôn đủ 12 ô
</script>

<!-- 🔥 TRACKING -->
<script src="tracking.js"></script>

</body>
</html>
