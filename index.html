<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>For you</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">

  <style>
    body {
      background: #EAF4FB;
      font-family: 'Quicksand', sans-serif;
      text-align: center;
      color: #6B4F3A;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 15px;
      max-width: 500px;
      margin: auto;
    }

    .day {
      padding: 20px 0;
      border-radius: 15px;
      background: #A7C7E7;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    .day:hover {
      transform: scale(1.05);
    }

    .locked {
      background: #D6BFA9;
      color: #6B4F3A;
      cursor: not-allowed;
    }

    .today {
      border: 2px solid #6B4F3A;
    }
  </style>
</head>
<body>

<h2> 3412</h2>
<p>Mỗi ngày mở một cái nha...</p>

<div class="calendar" id="calendar"></div>

<script>
const startDate = new Date("2026-05-04"); // 👉 ngày bắt đầu
const totalDays = 50;

const calendar = document.getElementById("calendar");
const today = new Date();

for (let i = 1; i <= totalDays; i++) {

  const unlock = new Date(startDate);
  unlock.setDate(startDate.getDate() + (i - 1));

  const div = document.createElement("div");
  div.classList.add("day");

  // check hôm nay
  const isToday = today.toDateString() === unlock.toDateString();

  if (today < unlock) {
    div.classList.add("locked");
    div.innerHTML = `🔒<br>Day ${i}`;
    div.onclick = () => alert("⏳ Chưa tới ngày...");
  } else {
    div.innerHTML = `🔓<br>Day ${i}`;
    div.onclick = () => {
      window.location.href = `day${i}.html`;
    };
  }

  if (isToday) {
    div.classList.add("today");
  }

  calendar.appendChild(div);
}
</script>

</body>
</html>
