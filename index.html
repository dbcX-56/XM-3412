<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For you</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">

<style>
body {
  background: #EAF4FB;
  font-family: 'Quicksand', sans-serif;
  text-align: center;
  color: #6B4F3A;
}

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  margin-top: 20px;
}

.header h2 { margin: 0; }

.cute-img {
  width: 140px;
  margin: 12px auto;
  display: block;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  max-width: 360px;
  margin: 30px auto;
}

.card {
  perspective: 1000px;
}

.inner {
  height: 110px;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.card.open .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 18px;

  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;

  backface-visibility: hidden;
  font-weight: bold;
  font-size: 15px;
}

/* 👉 GIỮ NGUYÊN màu card thường */
.front { background: #D6BFA9; }

.back {
  background: #A7C7E7;
  transform: rotateY(180deg);
}

.locked {
  opacity: 0.5;
}

/* ❄️ INTRO RIÊNG */
.intro-card {
  grid-column: span 3;
  animation: glow 2s infinite alternate;
}

.intro-card .inner {
  height: 115px;
}

/* 👉 CHỈ intro mới màu xanh */
.intro-card .front {
  background: linear-gradient(135deg, #DFF6FF, #F0FBFF);
  font-size: 17px;
  box-shadow: 0 0 12px rgba(173, 216, 230, 0.5);
  transition: all 0.3s ease;
}

.intro-card .back {
  background: linear-gradient(135deg, #CDEBFF, #EAF6FF);
}

/* glow */
@keyframes glow {
  from {
    box-shadow: 0 0 8px rgba(173,216,230,0.4);
  }
  to {
    box-shadow: 0 0 18px rgba(173,216,230,0.9);
  }
}

/* hover */
.intro-card:hover .front {
  transform: scale(1.04);
  box-shadow: 0 0 22px rgba(173,216,230,1);
}
</style>
</head>

<body>

<div class="header">
  <h2>3412</h2>
  <span>🧸🥄</span>
</div>

<img src="cuaxin.png?v=111" class="cute-img">

<p>Mỗi ngày mở một cái nha... 💌</p>

<div class="calendar" id="cal"></div>

<script>
const today = new Date();

const unlockDates = {
  1: "2026-03-01",
  2: "2026-03-05",
  3: "2026-03-10",
  4: "2026-03-20",
  5: "2026-03-30",
  6: "2026-04-05",
  7: "2026-04-10",
  8: "2026-04-15",
  9: "2026-04-20",
  10: "2026-04-25",
  11: "2026-04-28",
  12: "2026-05-01"
};

function render(total) {
  const container = document.getElementById("cal");

  // 🎂 INTRO
  const intro = document.createElement("div");
  intro.classList.add("card", "intro-card");

  const innerIntro = document.createElement("div");
  innerIntro.classList.add("inner");

  const frontIntro = document.createElement("div");
  frontIntro.classList.add("front");
  frontIntro.innerHTML = "🎂<br>Ngày của Xịn nè";

  const backIntro = document.createElement("div");
  backIntro.classList.add("back");
  backIntro.innerHTML = "Mở nè 🎂";

  intro.onclick = () => {
    intro.classList.add("open");
    setTimeout(() => {
      window.location.href = "start.html";
    }, 600);
  };

  innerIntro.appendChild(frontIntro);
  innerIntro.appendChild(backIntro);
  intro.appendChild(innerIntro);
  container.appendChild(intro);

  // DAY
  for (let i = 1; i <= total; i++) {

    const unlockStr = unlockDates[i];
    const unlock = unlockStr ? new Date(unlockStr + "T00:00:00+07:00") : null;

    const card = document.createElement("div");
    card.classList.add("card");

    const inner = document.createElement("div");
    inner.classList.add("inner");

    const front = document.createElement("div");
    front.classList.add("front");

    const back = document.createElement("div");
    back.classList.add("back");

    if (!unlock) {
      front.innerHTML = `🔒 Day ${i}`;
      card.classList.add("locked");
    } else if (today >= unlock) {
      front.innerHTML = `🔓 Day ${i}`;
    } else {
      front.innerHTML = `🔒 Day ${i}`;
      card.classList.add("locked");
    }

    back.innerHTML = `💌<br>Mở`;

    card.onclick = () => {
      if (!unlock || today < unlock) {
        alert("⏳ Chưa tới ngày...");
        return;
      }

      card.classList.add("open");

      setTimeout(() => {
        window.location.href = `day${i}.html`;
      }, 600);
    };

    inner.appendChild(front);
    inner.appendChild(back);
    card.appendChild(inner);
    container.appendChild(card);
  }
}

render(12);
</script>

</body>
</html>
