<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>For you</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  padding: 0;
  background: #EAF4FB;
  font-family: 'Quicksand', sans-serif;
  text-align: center;
  color: #6B4F3A;
}

/* HEADER */

.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  margin-top: 20px;
}

.cute-img {
  width: 140px;
  margin: 12px auto;
}

p {
  margin-top: 8px;
}

/* PAGE */

.page {
  display: none;
}

.page.active {
  display: block;
}

/* GRID */

.calendar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  max-width: 360px;
  margin: 30px auto;
}

/* CARD */

.card {
  perspective: 1000px;
  position: relative;
  height: 110px;
}

.inner {
  height: 110px;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.card.open .inner {
  transform: rotateY(180deg);
}

.front,
.back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 18px;

  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;

  backface-visibility: hidden;
  font-weight: bold;
  box-sizing: border-box;
  padding: 10px;
}

/* FRONT */

.front {
  background: #D6BFA9;
}

/* BACK */

.back {
  background: #A7C7E7;
  transform: rotateY(180deg);
}

/* LOCK */

.card.locked .front {
  opacity: 0.5;
  filter: grayscale(30%);
}

/* INTRO */

.intro-card {
  grid-column: span 3;
}

.intro-card .inner {
  height: 115px;
}

.intro-card .front {
  background: linear-gradient(135deg, #DFF6FF, #F0FBFF);
  box-shadow: 0 0 12px rgba(173,216,230,0.5);
}

/* BUTTONS */

.controls {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 40px;
}

.controls button {
  background: #A7C7E7;
  border: none;
  padding: 12px 22px;
  border-radius: 999px;
  font-family: 'Quicksand';
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.controls button:hover {
  transform: scale(1.05);
}

/* ARROW */

.arrow {
  display: inline-block;
}

.arrow.back {
  transform: scaleX(-1);
}

/* PAGE NUMBER */

.page-number {
  margin-top: -10px;
  font-size: 14px;
  opacity: 0.7;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">
  <h2>3412</h2>
  <span>🧸🥄</span>
</div>

<img src="cuaxin.png" class="cute-img">

<p>Mỗi ngày mở một cái nha... 💌</p>

<!-- ================= PAGE 1 ================= -->

<div class="page active" id="page1">

  <div class="calendar" id="cal1"></div>

  <div class="controls">
    <button onclick="showPage(2)">
      <span class="arrow">➜</span>
    </button>
  </div>

</div>

<!-- ================= PAGE 2 ================= -->

<div class="page" id="page2">

  <div class="calendar" id="cal2"></div>

  <div class="controls">
    <button onclick="showPage(1)">
      <span class="arrow back">➜</span>
    </button>
  </div>

</div>
```
