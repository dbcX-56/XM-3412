<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>For you</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">

  <style>
    body {
      background: #EAF4FB;
      font-family: 'Quicksand', sans-serif;
      text-align: center;
      color: #6B4F3A;
      padding: 20px;
    }

    h2 {
      margin-bottom: 5px;
    }

    p {
      margin-bottom: 15px;
    }

    /* thứ trong tuần */
    .week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      max-width: 500px;
      margin: auto;
      margin-bottom: 8px;
      font-size: 13px;
      opacity: 0.7;
    }

    /* calendar */
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
      max-width: 500px;
      margin: auto;

      max-height: 400px;
      overflow-y: auto;
    }

    .day {
      padding: 18px 0;
      border-radius: 15px;
      background: #A7C7E7;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
      font-size: 14px;
    }

    .day:hover {
      transform: scale(1.05);
    }

    .locked {
      background: #D6BFA9;
      color: #6B4F3A;
      cursor: not-allowed;
    }

    .today {
      border: 2px solid #6B4F3A;
      background: #cfe5f7;
    }
  </style>
</head>
<body>

<h2> 3412</h2>
<p>Mỗi ngày mở một cái nha...</p>

<!-- thứ -->
<div class="week">
  <div>CN</div>
  <div>T2</div>
  <div>T3</div>
  <div>T4</div>
  <div>T5</div>
  <div>T6</div>
  <div>T7</div>
</div>

<!-- calendar -->
<div class="calendar" id="calendar"></div>

<script>
const startDate = new Date("2026-05-04"); // 
const totalDays = 50; // 

const calendar = document.getElementById("calendar");
const today = new Date();

for (let i = 1; i <= totalDays; i++) {

  const unlock = new Date(startDate);
  unlock.setDate(startDate.getDate() + (i - 1));

  const div = document.createElement("div");
  div.classList.add("day");

  const isToday = today.toDateString() === unlock.toDateString();

  if (today < unlock) {
    div.classList.add("locked");
    div.innerHTML = `🔒<br>Day ${i}`;
    div.onclick = () => alert("⏳ Chưa tới ngày...");
  } else {
    div.innerHTML = `🔓<br>Day ${i}`;
    div.onclick = () => {
      window.location.href = `day${i}.html`;
    };
  }

  if (isToday) {
    div.classList.add("today");
  }

  calendar.appendChild(div);
}
</script>

</body>
</html>
