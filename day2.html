<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>For you</title>

  <!-- font đẹp -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      background: #EAF4FB;
      font-family: 'Quicksand', Arial, sans-serif;
      text-align: center;
      color: #6B4F3A;
      padding: 20px;
    }

    .box {
      background: #ffffffcc;
      padding: 25px;
      border-radius: 20px;
      max-width: 650px;
      margin: auto;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      line-height: 1.7;
      text-align: left;
    }

    h3 {
      margin-bottom: 15px;
      text-align: center;
    }

    p {
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

<div id="content">Đang mở...</div>

<script>
// 🔥 TEST NGAY HÔM NAY
const unlockDate = new Date();
unlockDate.setHours(0,0,0,0);

const now = new Date();
const content = document.getElementById("content");

if (now < unlockDate) {
  content.innerHTML = `
    <div class="box">
      <h3>⏳ Chưa tới ngày</h3>
      <p>Quay lại sau nha...</p>
    </div>
  `;
} else {
  content.innerHTML = `
    <div class="box">

    <h3>💌 Mập đây,</h3>

    <p>Em viết những lời này vào những ngày trước ngày anh sẽ đọc được, nên mỗi ngày hãy mở 1 cái nha, vì đó đều là những gì em muốn nói với anh khi chúng ta không còn bên cạnh nhau nữa. 
    Không biết sẽ kéo dài đến ngày thứ bao nhiêu, em ko rõ..</p>

    <p><b>Em thương Anh.</b></p>

    <p>Hnay là 3 ngày anh xem tn của em nhưng ko tl.</p>

    <p>Em đã đắn đo lúc làm cái này vì vốn dĩ em ko chắc mình có đủ can đảm để anh đọc dc ko.
    Thật ra em định viết thư, nhưng điều đó thì hơi bất tiện cho anh nên em chuyển thành cái này vậy. Giỏi ko ?</p>

    <p>Xịn của em rất giỏi, nhưng lại kém trong việc chia sẻ, em mong anh đừng tự ôm nhiều thứ một mình mà để bản thân bị gục ngã. Vì người đau lòng sẽ là em.</p>

    <p>Chuyện cây bút, em đưa lại ko phải vì muốn trả đâu, vì nó hết mực rồi, nhưng em ko dám nói vs anh để fill lại. Vì sợ anh nói hết rồi thì e bỏ đi.
    Vậy nên em mới để lại trong hộp bút của anh chứ ko phải để cạnh cái hộp. Hy vọng anh sẽ test thử và biết vì sao nó nằm ở đó.</p>

    <p>Hôm nay em có 1 snghi luôn quẩn quanh trong đầu, liệu rằng ngày hôm đó... nếu em gặp anh thì mọi chuyện có khác đi không...</p>

    <p>Anh biết ko, mỗi ngày đi làm em đều sợ ko nhìn thấy anh... nhưng ko thấy anh, em lại càng sợ hơn...</p>

    <p>Em nhớ những lúc anh cười, những lúc anh vui vẻ và nhõng nhẽo bên em, em nhớ gương mặt anh lúc ngủ bình yên và cái ôm của anh.</p>

    <p><b>Em thương anh, Xịn của em.</b></p>

    <p>Em chưa bao giờ hối hận vì đã bên anh... nhưng cũng có những ngày em thấy việc sống thôi cũng khó khăn...</p>

    <p>Em cố sống qua từng ngày... nhưng mỗi phút trôi qua đều dài và đau đớn.</p>

    <p>Em biết mình có thể trông thảm hại... nhưng em chỉ biết em cần anh.</p>

    <p>Em xin lỗi vì đã không ngồi xuống và nói hết những điều trong anh trong suốt 2 năm đó.</p>

    <p>Ngày 3/4... ngày anh cầm bó hoa đến... khiến em nhận ra mình cũng xứng đáng được yêu thương...</p>

    <p>Em ước được gặp anh sớm hơn... được ở bên anh nhiều hơn...</p>

    <p>Em vẫn thương anh... và sẽ thương anh mãi.</p>

    <p>Em nhớ tay ấm của anh.</p>

    <p><b>Xịn của em</b></p>

    </div>
  `;
}
</script>

<!-- 🔥 TRACKING -->
<script src="tracking.js"></script>

</body>
</html>
