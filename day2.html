<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>For you</title>

  <!-- dbcM font -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      background: #EAF4FB;
      font-family: 'Quicksand', Arial, sans-serif;
      text-align: center;
      color: #6B4F3A;
      padding: 20px;
    }

    .box {
      background: #ffffffcc;
      padding: 25px;
      border-radius: 20px;
      max-width: 650px;
      margin: auto;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      line-height: 1.8;
      text-align: left;
    }

    h3 {
      text-align: center;
      margin-bottom: 15px;
    }

    p {
      margin-bottom: 14px;
    }
  </style>
</head>

<body>

<div id="content">Đang mở...</div>

<script>
// 🔒 unlock ngày 05/05/2026
const unlockDate = new Date(2026, 4, 5);

const now = new Date();
const content = document.getElementById("content");

if (now < unlockDate) {
  content.innerHTML = `
    <div class="box">
      <h3>⏳ Chưa tới ngày</h3>
      <p>Hãy quay lại vào 05/05 nha...</p>
    </div>
  `;
} else {
  content.innerHTML = `
    <div class="box">

    <h3>💌</h3>

    <p>Hay thiệt, hôm qua em có một giấc mơ, trong đó có anh và em. Anh nhắn tin hỏi em liệu chúng ta có thể bỏ qua tất cả những điều trước đó để làm lại không. Em đồng ý rồi bật dậy, điều đầu tiên làm là lấy điện thoại để kiểm tra. Nhưng vẫn vậy đó… vẫn không có gì.</p>

    <p>Mai em thi rồi. Nhớ lúc trước anh nói đợt sau em thi sẽ chạy ra chơi với em. Nhưng giờ em cũng không còn được nhận điều đó nữa.</p>

    <p>Lần đầu tiên gặp anh, đối với em anh mang lại cảm giác ấm áp và vui vẻ. Nhưng nhìn anh cũng rất buồn, cảm giác anh ôm nhiều thứ một mình và không chia sẻ nhiều với ai. Mà đúng thiệt, vì thời gian qua bên nhau nhưng em cũng không là người lắng nghe anh nhiều… em xin lỗi.</p>

    <p>Xịn hơi khó tính, đôi lúc không kiểm soát được sự tức giận của mình… phải thay đổi một chút đi nha. Vì sẽ tốt hơn cho công việc sau này của anh, cũng như còn P với M nữa mà.</p>

    <p>Cho dù anh có hơi lớn hơn em một chút nhưng em vẫn thấy chúng ta hợp nhau. Anh là người vui tính, ấm áp và chiều chuộng em, cũng là người cố gắng để trẻ trung hơn khi bên em… em thích điều đó lắm. Anh là người đã cho em sự an toàn, bình yên, và cũng là người rất quan trọng với em.</p>

    <p>Em thích anh vẽ, thích nét chữ của anh. Thích anh là người vui vẻ. Nhưng vì chúng ta đã từng bên nhau… nên điều em mong nhất là nếu có thể, anh vẫn sống hạnh phúc, vui vẻ và khỏe mạnh.</p>

    <p>Em vẫn còn nhớ lần đầu ra lấy ly nước anh mua… anh lúc đó vừa đẹp trai vừa ấm áp, tim em đập liên hồi và cười không lý do.</p>

    <p>Em nhớ lúc anh cố gắng để hôn em… nhớ lúc tan làm tụi mình gặp nhau một chút… nhớ lúc em bye anh rồi đi ra vẫn thấy anh đứng đó chờ.</p>

    <p>Em nhớ lần em ngủ quên mà để anh đợi gần cả tiếng… nhớ lúc tụi mình đi làm nến cùng nhau vui như thế nào.</p>

    <p><b>Em nhớ tụi mình.</b></p>

    <p>Em mong Xịn có thể chia sẻ nhiều hơn, nói ra nhiều hơn để nhẹ lòng hơn. Em cũng mong anh luôn khỏe mạnh… vì bên cạnh anh còn nhiều người cần anh lắm.</p>

    <p>Em chỉ mong anh vẫn sống bình thường, vui vẻ và hạnh phúc.</p>

    <p>Em từng nói bên anh có em là thật lòng… nhưng anh lại nói anh chỉ muốn một mình. Em đau lòng, nhưng cũng chấp nhận… vì ít nhất em biết được điều anh thật sự muốn.</p>

    <p>Cho dù em làm gì, đi đâu… em vẫn thấy hình ảnh của anh. Em muốn thoát ra, nhưng em không biết cách.</p>

    <p>Tình yêu của tụi mình… thật sự rất đẹp. Đúng như anh nói, một mối quan hệ đẹp… nhưng không thể tiếp tục.</p>

    <p>Bên anh, em đã rất hạnh phúc. Những gì anh làm cho em… em đều cảm nhận được. Những lần cãi nhau… em không còn nhớ rõ nữa. Em chỉ nhớ tụi mình đã từng vui như thế nào.</p>

    <p>Em từng cố nghĩ về những điều tiêu cực để quên anh nhanh hơn… nhưng em không làm được. Vì những điều đẹp giữa tụi mình đáng giá hơn tất cả.</p>

    <p>Em đã buồn rất nhiều… khi anh đi công tác mà em không biết anh đi đâu. Trước đây anh luôn nói với em mọi thứ… nhưng lần đó thì không. Em thấy trống rỗng.</p>

    <p><b>Em nhớ anh, rất nhiều.</b></p>

    </div>
  `;
}
</script>

<!-- 🔥 tracking -->
<script src="tracking.js"></script>

</body>
</html>
